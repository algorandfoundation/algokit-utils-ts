name: Pull Request

on:
  pull_request:
    branches: [main, decoupling]

permissions:
  contents: read

jobs:
  build-and-test:
    uses: algorandfoundation/algokit-shared-config/.github/workflows/node-ci.yml@chore/node-npm
    with:
      run-commit-lint: true
      run-build: true
      audit-script: npm run audit
      test-script: npm run test -- --silent
      install-algokit: true
      polytest: true

  check-docs:
    uses: algorandfoundation/algokit-shared-config/.github/workflows/check-docs.yml@chore/node-npm

  verify-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Start LocalNet
        run: |
          pipx install algokit
          algokit localnet start
          npx --yes wait-on tcp:4001 -t 30000

      - name: Install examples dependencies
        working-directory: examples
        run: npm ci --ignore-scripts

      - name: Verify all examples
        working-directory: examples
        run: ./verify-all.sh
