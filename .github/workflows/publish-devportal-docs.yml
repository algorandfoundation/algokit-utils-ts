name: Publish DevPortal Docs

on:
  workflow_dispatch:
  pull_request: # temporary: remove once workflow_dispatch is available in UI

permissions:
  contents: write

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install root dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish DevPortal Docs
        uses: algorandfoundation/devportal/.github/actions/publish-devportal-docs@ci/update-publish-devportal-docs-workflow
        with:
          docs-dir: docs