name: 'CI'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '24.x'
  commit-lint-from:
    description: 'Git SHA to lint commits from'
    required: false
    default: ''
  commit-lint-to:
    description: 'Git SHA to lint commits to'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@v4
      with:
        package_json_file: package.json

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Setup Polytest
      uses: algorandfoundation/algokit-polytest/.github/actions/setup-polytest@main

    - name: Validate polytest algod_client tests
      shell: bash
      run: pnpm run polytest:validate-algod

    - name: Generate transact polytest files
      shell: bash
      working-directory: packages/transact/
      run: pnpm run polytest:generate

    - name: Commit lint
      shell: bash
      run: pnpm exec commitlint --from ${{ inputs.commit-lint-from }} --to ${{ inputs.commit-lint-to }} --verbose

    - name: Lint
      shell: bash
      run: pnpm run lint

    - name: Check types
      shell: bash
      run: pnpm run check-types

    # Start localnet for integration tests
    - name: Start LocalNet
      shell: bash
      run: |
        pipx install algokit
        algokit localnet start
        pnpm dlx wait-on tcp:4001 -t 30000

    # Start mock servers using composite action
    - name: Start algod mock server
      uses: algorandfoundation/algokit-polytest/.github/actions/run-mock-server@main
      with:
        client: algod

    - name: Start indexer mock server
      uses: algorandfoundation/algokit-polytest/.github/actions/run-mock-server@main
      with:
        client: indexer

    - name: Start kmd mock server
      uses: algorandfoundation/algokit-polytest/.github/actions/run-mock-server@main
      with:
        client: kmd

    - name: Run tests
      shell: bash
      run: pnpm run test -- --silent

    - name: Audit
      shell: bash
      run: pnpm audit

    - name: Build
      shell: bash
      run: pnpm run build
